profile_assessment_task:
  description: >
    Read the CV: {cv_text}.
    List the top 5 technical skills and top 3 soft skills.
    Suggest 3 job titles for a junior/student profile.
    Be concise — max 200 words total.
  expected_output: >
    Structured profile in Spanish: skills list, 3 roles, 
    and a 2-sentence professional summary. Max 200 words.
  agent: career_profiler

job_scouting_task:
  description: >
    Take the 3 roles from the previous task.
    Search for 3 real, active job postings.
    Include: Job Title, Company, and the REAL URL.
    Do NOT invent URLs. Be concise.
  expected_output: >
    3 job postings. Each with: Title, Company, URL. Max 150 words.
  agent: job_market_scout

company_intelligence_task:
  description: >
    For each company from the job scouting phase:
    Find what they do, their values, and 1 recent project.
    Write a 2-sentence company summary.
  expected_output: >
    Brief for each company: 2-sentence summary,
    values, and 1 recent project. Max 200 words total.
  agent: corporate_culture_researcher

custom_outreach_drafting_task:
  description: >
    For EACH of the 3 companies, write in SPANISH:
    - **Empresa**: name
    - **Puesto**: title
    - **Enlace**: real URL
    - **Sobre la empresa**: 2-sentence summary
    - **Mensaje de postulación**: 3-4 sentence cover message
    Tone: professional, enthusiastic, human.
  expected_output: >
    3 application blocks in Markdown (Spanish).
    Each: Empresa, Puesto, Enlace, Sobre la empresa, Mensaje.
  agent: application_strategist